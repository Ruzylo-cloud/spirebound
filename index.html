const deepDef = (fv, rv, d) => { if (rv === undefined) return fv;        // recursive default-fill (schema bumps
  if (!isObj(fv) || !isObj(rv) || isBN(fv) || Array.isArray(fv) || d > 3) return rv; // can nest — never NaN old saves)
  const o = Object.assign({}, rv);
  for (const k in fv) o[k] = (k in rv) ? deepDef(fv[k], rv[k], d + 1) : fv[k];
  return o; };
G.save.migrate = raw => { const fresh = G.newState(); if (!isObj(raw)) return fresh;
  const out = {};
  for (const k in fresh) { const fv = fresh[k], rv = raw[k];
    if (rv === undefined) out[k] = fv;                                   // missing → default (containers appear)
    else if (isObj(fv) && isObj(rv) && !isBN(fv)) out[k] = deepDef(fv, rv, 0); // deep merge → new sub-keys added, raw kept
    else out[k] = rv; }
  for (const k in raw) if (!(k in out)) out[k] = raw[k];                 // preserve unknown / newer fields (never wipe)
  /* version ladder — additive only, NEVER wipes (v0-shaped blobs adopt v1 containers via the merge above) */
  let v = out.v | 0; if (v < 1) v = 1; out.v = v;
  BN_PATHS.forEach(p => out[p] = BN.san(out[p]));                        // BN {m,e} survive JSON roundtrip
  if (out.familiars && typeof out.familiars.dust !== 'number') out.familiars.dust = 0;
  if (!out.time) out.time = {maxDateReached: 0, lastSeen: 0, install: 0};
  return out; };
G.save.load = () => { let raw; try { raw = localStorage.getItem(KEY); } catch (e) { return null; }
  if (!raw) return null; let obj; try { obj = JSON.parse(raw); } catch (e) { return null; }
  const stateRaw = obj && obj.state ? obj.state : obj;                   // tolerate bare-state blobs
  const state = G.save.migrate(stateRaw);
  if (obj && obj.account && obj.account.provider) state.provider = obj.account.provider;
  G.S = state; return state; };
G.save.write = opts => { opts = opts || {}; const S = G.S; if (!S) return false;
  if (!S.time) S.time = {maxDateReached: 0, lastSeen: 0, install: 0};
  S.time.lastSeen = G.gameNow(); if (!S.time.install) S.time.install = S.time.lastSeen;
  if (!opts.force && !G.save._verified) { let stored = null;             // wipe-guard read happens ONCE per session,
    try { const r = localStorage.getItem(KEY); if (r) { const o = JSON.parse(r); stored = o && o.state ? o.state : o; } } catch (e) {} // not on every 10s autosave (2-core floor)
    if (stored && !G.save.wipeGuard(S, stored)) return false; }
  const payload = {account: {provider: S.provider || 'guest'}, state: S, v: SCHEMA_V};
  let json; try { json = JSON.stringify(payload); } catch (e) { return false; }
  try { localStorage.setItem(KEY, json); G.save._verified = 1; return true; }
  catch (e) {
    if (e && (e.name === 'QuotaExceededError' || e.code === 22 || /quota/i.test(e.message || ''))) {
      let t; try { t = JSON.parse(json); } catch (_) { return false; }           // drop ghost/cache blobs, retry once
      if (t.state) { if (t.state.liveops) delete t.state.liveops.ghosts;
        delete t.state.ghosts; delete t.state._cache; delete t.state._bake; delete t.state.social; }
      try { localStorage.setItem(KEY, JSON.stringify(t)); return true; } catch (e2) { return false; } }
    return false; } };
G.save.export = () => { const S = G.S || G.newState();
  const json = JSON.stringify({account: {provider: S.provider || 'guest'}, state: S, v: SCHEMA_V});
  try { return btoa(unescape(encodeURIComponent(json))); } catch (e) { return json; } };
G.save.import = str => { if (!str) return false; let json = str;
  try { json = decodeURIComponent(escape(atob(('' + str).trim()))); } catch (e) { json = str; }
  let obj; try { obj = JSON.parse(json); } catch (e) { return false; }
  const stateRaw = obj && obj.state ? obj.state : obj;
  const state = G.save.migrate(stateRaw);
  if (obj && obj.account && obj.account.provider) state.provider = obj.account.provider;
  G.S = state; try { G.save.write({force: 1}); } catch (e) {} return state; };
G.save.wipe = () => { try { localStorage.removeItem(KEY); } catch (e) {} };
const safeSave = () => { try { G.save.write(); } catch (e) { if (G.crashlog) G.crashlog.log('save', e && e.message, e && e.stack); } };
G.save.startAutosave = () => { if (G.save._auto) return; G.save._auto = 1;
  if (typeof setInterval !== 'undefined') setInterval(safeSave, 10000);
  if (typeof document !== 'undefined') {
    document.addEventListener('visibilitychange', () => { if (document.hidden) safeSave(); });
    if (typeof addEventListener !== 'undefined') addEventListener('pagehide', safeSave); } };
})();

/* ==== src/12-audio-main.js ==== */
'use strict';
/* SPIREBOUND audio + main — WebAudio synth (lazy, gesture-unlocked), the rAF game loop (dt clamp,
   analytic-past-6× with bosses ALWAYS real-time · LOCKED #3), boot orchestration, and G.main.
   Consumes the 08 static-layer bake. Browser-only (never loaded by the headless harnesses). */
(() => {
const $ = s => document.querySelector(s);

/* ================= WebAudio synth — tiny osc/gain blips, master gain, S.opt.mute, lazy ctx ===== */
G.audio = (() => {
  let ctx = null, master = null, unlocked = false;
  const on = () => !(G.S && G.S.opt && G.S.opt.mute);
  const ensure = () => { if (ctx) return ctx;
    try { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return null;
      ctx = new AC(); master = ctx.createGain(); master.gain.value = .18;
      const comp = ctx.createDynamicsCompressor();                      // limiter: boss chords over kill spam never clip
      comp.threshold.value = -18; comp.knee.value = 24; comp.ratio.value = 8;
      master.connect(comp); comp.connect(ctx.destination); }
    catch (e) { ctx = null; } return ctx; };
  const noise = (dur, gain, lp) => { if (!on()) return; const c = ensure(); if (!c) return;   // impact texture layer
    try { const n = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = c.createBufferSource(); src.buffer = buf;
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp || 900;
      const g = c.createGain(); g.gain.value = gain || .1;
      src.connect(f); f.connect(g); g.connect(master); src.start(); } catch (e) {} };
  const blip = (freq, dur, type, gain, slideTo) => { if (!on()) return; const c = ensure(); if (!c) return;
    try { if (c.state === 'suspended') c.resume();
      const t0 = c.currentTime, o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
      g.gain.setValueAtTime(.0001, t0); g.gain.exponentialRampToValueAtTime(Math.max(.001, gain || .3), t0 + .008);
      g.gain.exponentialRampToValueAtTime(.0008, t0 + dur);
      o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + .02); } catch (e) {} };
  const chord = (freqs, dur, type, gain) => { const c = ensure(); if (!c) return;   // sample-accurate arpeggio
    freqs.forEach((f, i) => { try { const t0 = c.currentTime + i * .02, o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine'; o.frequency.setValueAtTime(f, t0);
      g.gain.setValueAtTime(.0001, t0); g.gain.exponentialRampToValueAtTime(Math.max(.001, gain || .3), t0 + .01);
      g.gain.exponentialRampToValueAtTime(.0008, t0 + dur);
      o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + .02); } catch (e) {} }); };
  return {ensure, blip, chord, noise, ui: () => blip(660, .06, 'triangle', .10),
    toggleMute: () => { if (G.S && G.S.opt) G.S.opt.mute = G.S.opt.mute ? 0 : 1; return G.S.opt && G.S.opt.mute; },
    unlock: () => { if (unlocked) return; unlocked = 1; const c = ensure(); if (c && c.state === 'suspended') { try { c.resume(); } catch (e) {} } }};
})();
/* bus-driven sfx (shot is LOD-gated + throttled so the hot loop never floods the graph) */
let _lastShot = 0;
G.bus.on('shot', d => { const now = G.main._now || 0;
  if (G.cam && G.cam.lod && G.cam.lod() < 2) return; if (now - _lastShot < 55) return; _lastShot = now;
  G.audio.blip(d && d.crit ? 900 : 640, .05, 'square', .045, 360); });
G.bus.on('kill',     () => G.audio.blip(320, .08, 'triangle', .09, 170));
G.bus.on('ult',      () => G.audio.chord([220, 330, 440], .26, 'sawtooth', .11));
G.bus.on('boss',     () => G.audio.chord([110, 138, 82], .5, 'sawtooth', .16));
G.bus.on('bossKill', () => { G.audio.chord([440, 330, 220, 165], .38, 'triangle', .13); G.audio.noise(.32, .14, 700); });
G.bus.on('bossArmor', d => { if (d && d.broken) G.audio.noise(.16, .12, 1600); });
G.bus.on('wisp',     () => G.audio.chord([880, 1180, 1560], .18, 'sine', .12));
G.bus.on('leak',     () => G.audio.blip(150, .22, 'sawtooth', .15, 60));
G.bus.on('place',    () => G.audio.blip(520, .07, 'sine', .10, 720));
G.bus.on('perk',     () => G.audio.chord([523, 659, 784], .22, 'triangle', .11));

/* ================= theme wiring — set data-theme so 00-head [data-theme] vars activate, then 09's
   var-feed. Keeps G.applyTheme the single entry point (Part 13 keeps the vars). =================== */
const _applyTheme = G.applyTheme;
G.applyTheme = () => { try { if (typeof document !== 'undefined')
    document.documentElement.dataset.theme = (G.S && G.S.opt && G.S.opt.theme) || 'aurora'; } catch (e) {}
  if (_applyTheme) _applyTheme(); };

/* ================= main — newRun / loop / bake / boot ========================================== */
G.main = {_running: 0, _last: 0, _now: 0, _gs: 1, _gsT: 0};
G.main.bake = () => { if (G.render && G.render.markStale) G.render.markStale(); };
G.main.newRun = opts => { opts = opts || {}; const S = G.S;
  const tier = opts.tier || (S.tiers && S.tiers.unlocked) || 1, mapIdx = opts.mapIdx || 0;
  const R = G.sim.newRun(S, tier, mapIdx, opts);
  if (G.cam && G.cam.fit) G.cam.fit();
  G.main.bake();
  if (G.render) G.render.sel = null; if (G.ui) G.ui.sel = null;
  if (G.ui && G.ui.renderTray) G.ui.renderTray();
  if (G.ui && G.ui.renderHud) G.ui.renderHud();
  return R; };
const _now = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());
G.main.loop = ts => { if (!G.main._running) return;
  requestAnimationFrame(G.main.loop);
  const now = ts || _now();
  if (!G.main._last) { G.main._last = now; return; }                        // first frame after (re)start: seed clock, dt=0
  let dt = (now - G.main._last) / 1000; G.main._last = now; G.main._now = now;
  if (!isFinite(dt) || dt < 0) dt = 0; if (dt > .1) dt = .1;                 // clamp — no spike on tab return
  if (G.render && G.render.slowmoT > 0) { G.render.slowmoT -= dt; dt *= .35; } // boss-kill slow-mo payoff
  const R = G.R;
  try {
    if (R && !R.over) {
      if (now - G.main._gsT > 500) { G.main._gs = (G.acctMods(G.S).gameSpeed || 1); G.main._gsT = now; } // cache research speed
      const gs = (G.ui.speed || 1) * (G.main._gs || 1), bossLive = R.boss && R.boss.alive;
      if (gs > 6 && !bossLive) {                                               // >6×: analytic slice (LOCKED #3)…
        G.sim.analytic(R, dt * gs, 1);
        G.sim.step(R, dt > .05 ? .05 : dt);                                    // …plus a live layer so bosses can spawn + VFX run
      } else {                                                                 // ≤6× or a live boss: real-time, ≤6 substeps/frame
        const eff = Math.min(gs, 6), total = dt * eff;
        let n = Math.ceil(total / .05); if (n < 1) n = 1; if (n > 6) n = 6;
        const sdt = total / n; for (let i = 0; i < n; i++) G.sim.step(R, sdt); }
    }
  } catch (e) { G.crashlog.fatal('sim', e && e.message, e && e.stack); return; }
  try { if (G.ui && G.ui.frame) G.ui.frame(dt); }
  catch (e) { G.crashlog.log('ui', e && e.message, e && e.stack); }          // non-fatal: HUD hiccup shouldn't kill the run
  try { if (G.render && G.render.frame) G.render.frame(dt); }
  catch (e) { G.crashlog.fatal('render', e && e.message, e && e.stack); }
};
G.main.start = () => { if (G.main._running) return; G.main._running = 1; G.main._last = 0; requestAnimationFrame(G.main.loop); };
G.main.stop  = () => { G.main._running = 0; };

const installGestureUnlock = () => { if (typeof document === 'undefined') return;
  ['pointerdown', 'touchstart', 'keydown'].forEach(ev => document.addEventListener(ev, () => G.audio.unlock(), {passive: true}));
  document.addEventListener('click', e => { const el = e.target && e.target.closest && e.target.closest('button,.btn,.tab,.tcard,.ult');
    if (el) G.audio.ui(); }, {passive: true}); };
const installVisibility = () => { if (typeof document === 'undefined') return;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { G.main.stop(); try { G.save.write(); } catch (e) {} }
    else { G.main._last = 0; G.main.start(); } }); };                        // reseed on resume → no dt spike

G.main.boot = () => {
  let safeMode = 0; try { safeMode = sessionStorage.getItem('spirebound.safemode') === '1'; sessionStorage.removeItem('spirebound.safemode'); } catch (e) {}
  let st = null; try { st = G.save.load(); } catch (e) { G.crashlog && G.crashlog.log('load', e && e.message, e && e.stack); st = null; }
  G.S = st || G.newState();
  if (safeMode) { G.S.opt.quality = 'low'; G.S.opt.reduceMotion = 1; G.safeMode = 1; } // the two heaviest boot paths, skipped below
  if (!G.S.time) G.S.time = {maxDateReached: 0, lastSeen: 0, install: 0};
  if (!G.S.time.install) G.S.time.install = G.gameNow();
  if (G.liveops && G.liveops.ensureInstall) G.liveops.ensureInstall(G.S);
  if (G.dev && !G.S.opt.themePicked) G.S.opt.themePicked = 1; // ?dev boots straight past the first-launch gate (headless validation)
  G.applyTheme();
  G.ui.themeGate(() => { try {
    G.applyTheme();
    G.main.newRun({tier: (G.S.tiers && G.S.tiers.unlocked) || 1});
    G.ui.boot();
    G.render.init($('#cv'));
    installGestureUnlock(); installVisibility();
    if (G.save && G.save.startAutosave) G.save.startAutosave();
    G.main.start();
    /* return moments — the login/streak/episode beats are FELT, not swallowed (skipped in Safe Mode) */
    if (G.liveops && !safeMode) {
      const lg = G.liveops.checkLogin ? G.liveops.checkLogin(G.S) : null;
      if (lg && lg.isNew && lg.streak > 1) setTimeout(() => {
        G.ui.toast('🔥 Day ' + lg.streak + ' streak' + (lg.reward ? ' — +' + (lg.reward.prisms || 0) + '△ milestone!' : ' — welcome back'), 'big'); }, 900);
      const seen = G.S.liveops.epSeen | 0, un = G.liveops.episodesUnlocked ? G.liveops.episodesUnlocked(G.S) : 0;
      if (un > seen && seen > 0) setTimeout(() => { const ep = G.D.episodes[un - 1];
        if (ep) G.ui.toast('📖 New episode — “' + ep.nm + '” (Chronicle)', 'big'); }, 2200);
      if (un > 0 && !seen && G.D.episodes) setTimeout(() => { const ep = G.D.episodes[0]; // first-session cold open
        G.ui.modal('The Long Night — Episode 1 · ' + ep.nm, '<div class="sub" style="font-size:13.5px;line-height:1.5">' + ep.tx +
          '</div><div class="wa-row" style="margin-top:10px"><em>' + ep.st + '</em></div>', [{nm: 'Kindle the Spire', cls: 'buy'}]); }, 700);
      G.S.liveops.epSeen = un;
      if (G.liveops.runOffline) G.liveops.runOffline(G.S);               // the offline analytic catch-up — likeliest single
    } else if (G.liveops && G.liveops.ensureInstall) { G.S.time.lastSeen = G.gameNow(); } // culprit at huge idle gaps; Safe Mode skips it
    G.bus.on('achievement', a => G.ui.toast('🏆 ' + a.nm + ' — +' + a.prisms + '△' + (a.cosmetic ? ' + ' + a.cosmetic : ''), 'big'));
    G.bus.on('dailyWin', d => G.ui.toast('✅ Daily complete — +' + (d.rw.prisms || 0) + '△', 'good'));
    G.bus.on('weeklyDone', () => G.ui.toast('🗓 Weekly gauntlet CAPSTONE claimed', 'big'));
    if (G.ach) setInterval(() => { try { G.ach.check(G.S); } catch (e) {} }, 12000);
    if (safeMode) G.ui.toast('Safe Mode — offline catch-up + effects reduced', 'warn');
  } catch (e) { G.crashlog.fatal('boot', e && e.message, e && e.stack); } });
};

/* ================= CRASH RESILIENCE — local-only, ZERO network (competition rule intact) =======
   Ring-buffer crash log (spirebound.crashlog.v1) + a recovery overlay on fatal errors. The PRODUCTION
   reporting layer (iOS wrapper / hosted web POSTing this buffer to brain's /api/game/crash) rides the
   SAME G.crashlog.entries via the native bridge (12's window.webkit.messageHandlers hook, when
   present) — this file adds NOTHING to index.html's own network surface. */
G.BUILD = '2026.07.08-1';
G.crashlog = (() => {
  const KEY = 'spirebound.crashlog.v1', CAP = 30;
  const read = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { return []; } };
  const write = arr => { try { localStorage.setItem(KEY, JSON.stringify(arr.slice(-CAP))); } catch (e) {} };
  const badge = m => { try { const b = document.getElementById('errbadge'); const TAG = 'JS' + ' ' + 'ERROR';
    if (b) { b.textContent = TAG + ': ' + m; if (G.dev) b.style.display = 'block'; } } catch (e) {} };
  const log = (phase, msg, stack) => { try { badge(phase + ': ' + String(msg || ''));
      const arr = read();
      arr.push({ts: Date.now(), build: G.BUILD, phase, round: (G.R && G.R.round) || 0,
        msg: String(msg || '').slice(0, 300), stack: String(stack || '').slice(0, 800),
        saveVer: (G.S && G.S.v) || 0});
      write(arr); } catch (e) {} };
  let fatalShown = 0;
  const fatal = (phase, msg, stack) => { log(phase, msg, stack);
    if (fatalShown) return; fatalShown = 1;
    try { G.main.stop(); } catch (e) {}
    try { showRecovery(String(msg || 'Unknown error')); } catch (e) {} };
  return {log, fatal, all: read, clear: () => write([]),
    export: () => { try { return btoa(unescape(encodeURIComponent(JSON.stringify(read())))); } catch (e) { return '[]'; } }};
})();
/* window-level sentinel — catches whatever the phase-scoped try/catches below don't (defense in depth) */
if (typeof window !== 'undefined') {
  window.onerror = (msg, src, ln, col, err) => { G.crashlog.fatal('runtime', msg + ' @' + (ln || '?'), err && err.stack); return false; };
  if (window.addEventListener) window.addEventListener('unhandledrejection', ev => G.crashlog.fatal('promise', ev && ev.reason, ev && ev.reason && ev.reason.stack));
}
/* recovery overlay — reload / safe mode (skips offline catch-up, forces low quality+reduced motion,
   the two heaviest boot-time code paths) / export log. Solid plate, on-brand, zero deps on G.ui
   (a fatal may have hit before G.ui exists). */
function showRecovery(msg) { if (typeof document === 'undefined') return;
  if (document.getElementById('recover')) return;
  const el = document.createElement('div'); el.id = 'recover';
  el.style.cssText = 'position:fixed;inset:0;z-index:999;background:#0A0D18;display:flex;flex-direction:column;'
    + 'align-items:center;justify-content:center;gap:14px;padding:24px;font:14px -apple-system,sans-serif;color:#e8eefc;text-align:center';
  const mk = (tag, style, html) => { const x = document.createElement(tag); x.style.cssText = style || ''; if (html != null) x.innerHTML = html; return x; };
  el.appendChild(mk('div', 'font-family:Georgia,serif;font-variant:small-caps;letter-spacing:.14em;font-size:22px;color:#F0CF82', 'Spirebound stumbled'));
  el.appendChild(mk('div', 'color:#9fb0d0;font-size:12.5px;max-width:320px', 'The Spire held — your progress is saved. Something broke on screen: <span style="color:#ff8f8f">' + String(msg).slice(0, 140) + '</span>'));
  const row = mk('div', 'display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px');
  const btn = (label, bg, fn) => { const b = document.createElement('button');
    b.textContent = label; b.style.cssText = 'padding:11px 18px;border-radius:11px;border:1px solid #334066;'
      + 'background:' + bg + ';color:#e8eefc;font-weight:800;font-size:13px;min-height:44px'; b.onclick = fn; return b; };
  row.appendChild(btn('Reload', 'linear-gradient(180deg,#5FD6FF,#4bb8de)', () => { try { G.save.write({force: 1}); } catch (e) {} location.reload(); }));
  row.appendChild(btn('Safe Mode', '#1C2230', () => { try { sessionStorage.setItem('spirebound.safemode', '1'); } catch (e) {} location.reload(); }));
  row.appendChild(btn('Export Log', '#1C2230', () => { const ta = document.createElement('textarea');
    ta.style.cssText = 'width:min(80vw,360px);height:110px;margin-top:10px;background:#14171F;color:#e8eefc;border:1px solid #334066;border-radius:8px;padding:8px';
    ta.value = G.crashlog.export(); ta.readOnly = true; el.appendChild(ta); ta.select(); }));
  el.appendChild(row);
  document.body.appendChild(el);
}
if (typeof document !== 'undefined') {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', G.main.boot);
  else G.main.boot();
}
})();

</script>
<div id="errbadge" style="position:fixed;left:8px;bottom:8px;z-index:9999;display:none;max-width:90vw;padding:6px 10px;border-radius:8px;background:#3a0d12;border:1px solid #ff6b6b;color:#ffd9d9;font:11px ui-monospace,Menlo,monospace"></div>
