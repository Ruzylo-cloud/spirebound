<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SPIREBOUND</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spirebound">
<meta name="theme-color" content="#0A0D18">
<style>
/* ============ SPIREBOUND design system — Art Director style bible ============
   One constants source: CSS vars here mirror JS G.C. Themes swap hue anchors only.
   Grid 4px · radius 10/14/20 · stroke 1.5 · light top-left · type SF stack.       */
:root{
  --bg:#0A0D18; --bg2:#14171F; --bg3:#1C2230; --panel:#14171fd9; --panel2:#1C2230;
  --plate:linear-gradient(180deg,#1C2230,#14171F);
  --ink:#e8eefc; --ink2:#9fb0d0; --ink3:#5f6f92; --line:#26304d; --line2:#334066;
  --acc:#5FD6FF; --acc2:#9A7BFF; --gold:#D4A94E; --gilt:#F0CF82; --good:#5fe08a; --bad:#ff6b6b; --warn:#ffb84d;
  --fire:#ff6b35; --ice:#5fd6ff; --storm:#ffe066; --nature:#5fe08a; --void:#a56bff; --arcane:#8f7bff; --phys:#c9d4ea;
  --r-c:#9aa5b8; --r-u:#5fe08a; --r-r:#5fa8ff; --r-e:#b07bff; --r-l:#ffd76a; --r-m:#ff8fe8;
  --rad:14px; --rad-s:10px; --rad-l:20px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
  --glow:0 0 14px; --tap:44px;
}
/* themes hue-swap ONLY accent/accent2 — ink/base/plate/gold are FIXED (chairman ruling) */
:root[data-theme="ember"]{ --acc:#F0A24E; --acc2:#C74A2A; }
:root[data-theme="hollow"]{ --acc:#6FE0B0; --acc2:#243042; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;inset:0;overscroll-behavior:none}
body{background:var(--bg);color:var(--ink);touch-action:none;user-select:none;-webkit-user-select:none;
  font:15px/1.35 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;background:var(--bg)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
h1,h2,h3{font-weight:800;letter-spacing:.02em}
.mono{font-variant-numeric:tabular-nums}
/* ---------- HUD ---------- */
#hud{position:absolute;left:0;right:0;top:0;padding:calc(var(--sat) + 6px) max(10px,var(--sar)) 6px max(10px,var(--sal));
  display:flex;flex-direction:column;gap:5px;pointer-events:none;z-index:20}
.hudrow{display:flex;gap:6px;align-items:center}
.chip{pointer-events:auto;display:flex;align-items:center;gap:5px;background:var(--plate);border:1px solid var(--line);
  border-radius:999px;padding:4px 10px;font-size:12.5px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006}
.chip .ico{font-size:13px}
.chip.grow{flex:1;min-width:0}.chip .val{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hpwrap{pointer-events:auto;background:var(--plate);border:1px solid var(--line);border-radius:12px;padding:5px 8px;
  display:flex;flex-direction:column;gap:3px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006}
.bar{position:relative;height:6px;border-radius:99px;background:#0008;overflow:hidden}
.bar>i{position:absolute;inset:0;transform-origin:left;border-radius:99px;transition:transform .18s ease-out}
.bar.hp>i{background:linear-gradient(90deg,#ff6b6b,#ffb84d)}
.bar.ward>i{background:repeating-linear-gradient(115deg,var(--gilt) 0 5px,#cdb475 5px 10px)}
.bar.xp>i{background:linear-gradient(90deg,var(--gold),#fff2c2)}
.bar>b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:#fff;text-shadow:0 1px 2px #000c;letter-spacing:.04em}
#bossbar{position:absolute;left:50%;transform:translateX(-50%);top:calc(var(--sat) + 128px);width:min(78vw,420px);z-index:19;display:none}
#bossbar .bname{text-align:center;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);text-shadow:0 1px 3px #000;margin-bottom:3px}
#bossbar .bar{height:12px;border:1px solid var(--line2)}
#bossbar .bar>i{background:linear-gradient(90deg,#c23bff,#ff5f8f)}
/* ---------- right-side ultimates ---------- */
#ults{position:absolute;right:max(8px,var(--sar));top:50%;transform:translateY(-62%);display:flex;flex-direction:column;gap:8px;z-index:21}
.ult{position:relative;width:52px;height:52px;border-radius:16px;background:var(--plate);border:1px solid var(--line2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006}
.ult .ug{font-size:19px;line-height:1}
.ult .cd{position:absolute;inset:0;border-radius:16px;background:conic-gradient(#000a var(--p,0%),transparent 0)}
.ult.ready{border-color:var(--acc);box-shadow:var(--glow) color-mix(in srgb,var(--acc) 55%,transparent);animation:pulse 1.6s ease-in-out infinite}
.ult .auto{position:absolute;right:-4px;top:-4px;width:18px;height:18px;border-radius:99px;background:var(--bg3);border:1px solid var(--line2);
  font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--ink3)}
.ult .auto.on{background:var(--acc);color:#04283a;border-color:var(--acc)}
.ult .cdt{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:8px;font-weight:800;color:var(--ink2);text-shadow:0 1px 2px #000}
@keyframes pulse{50%{transform:scale(1.06)}}
/* ---------- bottom dock ---------- */
#dock{position:absolute;left:0;right:0;bottom:0;z-index:22;padding:0 max(6px,var(--sal)) 0 max(6px,var(--sar));
  background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--bg) 88%,transparent) 30%)}
#tray{display:flex;gap:7px;overflow-x:auto;padding:8px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x}
#tray::-webkit-scrollbar{display:none}
.tcard{flex:0 0 auto;width:64px;border-radius:var(--rad-s);background:var(--plate);border:1px solid var(--line);
  padding:5px 4px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006} /* shared 3-layer depth recipe */
.tcard canvas{width:38px;height:38px}
.tcard .tn{font-size:9px;font-weight:700;color:var(--ink2);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcard .tc{font-size:9.5px;font-weight:800;color:var(--acc)}
.tcard.afford{border-color:var(--line2)}
.tcard:not(.afford){opacity:.55}
.tcard.sel{border-color:var(--acc);box-shadow:var(--glow) color-mix(in srgb,var(--acc) 45%,transparent)}
.tcard .lk{position:absolute;inset:0;border-radius:inherit;background:#000a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--ink2)}
#tabbar{display:flex;gap:2px;padding:4px 2px calc(var(--sab) + 6px);justify-content:space-around}
#tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px;border-radius:10px;
  font-size:9px;font-weight:700;color:var(--ink3);min-height:var(--tap)}
#tabbar button .ti{font-size:17px;line-height:1}
#tabbar button.on{color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
#tabbar button .dot{position:absolute;margin-left:22px;margin-top:-2px;width:7px;height:7px;border-radius:99px;background:var(--bad);display:none}
#tabbar button.noti .dot{display:block}
/* ---------- sheet (tab panel) ---------- */
#sheet{position:absolute;left:0;right:0;bottom:0;top:calc(var(--sat) + 54px);z-index:30;display:none;flex-direction:column;
  background:linear-gradient(180deg,var(--bg2),var(--bg) 60%); /* SOLID plate over combat — glass is Store/Pass only (board law) */
  border-top-left-radius:var(--rad-l);border-top-right-radius:var(--rad-l);
  border-top:1px solid color-mix(in srgb,var(--acc) 38%,var(--line2)); /* 1px accent edge-light (T3 amendment) */
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 -12px 40px #0008;
  animation:up .22s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(28px);opacity:.4}}
#sheetHead{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
#sheetHead h2{font-size:19px;flex:1}
#sheetHead .x{width:34px;height:34px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);font-size:15px;font-weight:800;color:var(--ink2)}
#sheetBody{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 12px calc(var(--sab) + 84px);touch-action:pan-y;-webkit-overflow-scrolling:touch}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;margin:6px 0 10px}
.seg button{flex:1;padding:7px 4px;border-radius:9px;font-size:11.5px;font-weight:800;color:var(--ink3)}
.seg button.on{background:var(--bg3);color:var(--ink);box-shadow:0 1px 6px #0006}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:11px 12px;margin-bottom:9px}
.card h3{font-size:14px;margin-bottom:3px}
.card .sub{font-size:11.5px;color:var(--ink2)}
.row{display:flex;align-items:center;gap:9px}
.row .fill{flex:1;min-width:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(180deg,var(--panel2),var(--bg3));
  border:1px solid var(--line2);border-radius:11px;padding:9px 14px;font-size:12.5px;font-weight:800;color:var(--ink);min-height:38px}
.btn.pri{background:linear-gradient(180deg,color-mix(in srgb,var(--acc) 82%,#fff 0%),color-mix(in srgb,var(--acc) 62%,#003 12%));color:#062436;border-color:transparent;box-shadow:var(--glow) color-mix(in srgb,var(--acc) 35%,transparent)}
.btn.gold{background:linear-gradient(180deg,var(--gilt),var(--gold));color:#2E2004;border-color:transparent}
.btn.dis,.btn:disabled{opacity:.45;pointer-events:none}
.btn.sm{padding:5px 10px;min-height:30px;font-size:11px;border-radius:9px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);color:var(--ink2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rC{color:var(--r-c)}.rU{color:var(--r-u)}.rR{color:var(--r-r)}.rE{color:var(--r-e)}.rL{color:var(--r-l)}.rM{color:var(--r-m)}
.bC{border-color:var(--r-c)}.bU{border-color:var(--r-u)}.bR{border-color:var(--r-r)}.bE{border-color:var(--r-e)}.bL{border-color:var(--r-l)}.bM{border-color:var(--r-m)}
/* ---------- modals / toasts ---------- */
#modals{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:#000c} /* solid scrim — zero blur over combat */
.modal{width:min(92vw,420px);max-height:82vh;display:flex;flex-direction:column;background:var(--plate);border:1px solid color-mix(in srgb,var(--acc) 24%,var(--line2));
  border-radius:var(--rad-l);padding:18px 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 18px 60px #000c;animation:up .25s cubic-bezier(.2,.9,.3,1)}
.modal h2{font-size:20px;margin-bottom:4px}
.modal .mbody{overflow-y:auto;touch-action:pan-y;-webkit-overflow-scrolling:touch;margin:6px 0 12px;font-size:13px;color:var(--ink2)}
.modal .macts{display:flex;gap:8px}
.modal .macts .btn{flex:1}
#toasts{position:absolute;left:50%;transform:translateX(-50%);top:calc(var(--sat) + 136px);z-index:60;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;width:min(92vw,400px)}
.toast{background:var(--plate);border:1px solid var(--line2);border-radius:12px;padding:8px 14px;font-size:12.5px;font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 6px 24px #0009;animation:tst 3.4s ease forwards;text-align:center;max-width:100%}
.toast.big{border-color:var(--gold);box-shadow:var(--glow) color-mix(in srgb,var(--gold) 35%,transparent),0 6px 24px #0009}
@keyframes tst{0%{opacity:0;transform:translateY(-8px) scale(.94)}8%,84%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-6px)}}
/* ---------- theme gate ---------- */
#themeGate{position:absolute;inset:0;z-index:80;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
#themeGate h1{font-size:30px;letter-spacing:.14em;background:linear-gradient(180deg,#fff,var(--acc));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px color-mix(in srgb,var(--acc) 40%,transparent)}
#themeGate p{color:var(--ink2);font-size:13px;text-align:center;max-width:300px}
#themeGate.on{display:flex}
.gate-card{display:flex;flex-direction:column;gap:14px;width:min(420px,92vw);align-items:stretch}
.gate-title{font-size:26px;letter-spacing:.12em;text-align:center;background:linear-gradient(180deg,#fff,var(--acc));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px color-mix(in srgb,var(--acc) 40%,transparent)}
.theme-pick{display:flex;flex-direction:column;gap:4px;padding:14px 16px;border-radius:var(--rad-l);border:2px solid var(--line2);background:var(--bg2);color:var(--ink);text-align:left;cursor:pointer;transition:transform .15s,border-color .15s}
.theme-pick b{font-size:15px;letter-spacing:.04em}
.theme-pick span{font-size:12px;color:var(--ink2)}
.theme-pick:active{transform:scale(.97);border-color:var(--acc);box-shadow:0 0 14px color-mix(in srgb,var(--acc) 30%,transparent)}
.gate-note{color:var(--ink2);font-size:12px;text-align:center}
#themeCards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.themeCard{width:150px;border-radius:var(--rad-l);border:2px solid var(--line2);overflow:hidden;background:var(--bg2);display:flex;flex-direction:column;transition:transform .15s,border-color .15s}
.themeCard:active{transform:scale(.97)}
.themeCard canvas{width:100%;height:110px;display:block}
.themeCard .nm{padding:9px 6px 11px;text-align:center;font-weight:800;font-size:13px}
.themeCard .ds{font-size:10px;color:var(--ink2);text-align:center;padding:0 8px 12px}
/* ---------- FINAL Aurora HUD vocabulary (design-refs 08/09 + BOARD-CRITIQUE laws) ---------- */
#hud button{pointer-events:auto}
.num{font-variant-numeric:tabular-nums;font-family:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace}
.sp{flex:1}
.chip .lbl{font-size:8px;letter-spacing:.1em;color:var(--ink2);font-weight:800}
.chip .val{font-size:12.5px}
.chip.evt{border-color:var(--acc);color:var(--acc)}
.wavepill{display:flex;align-items:baseline;gap:6px;background:var(--plate);border:1px solid var(--line2);border-radius:12px;
  padding:4px 10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006}
.wavepill .wl{font-size:9px;letter-spacing:.14em;font-weight:800;color:var(--ink2)}
.wavepill b{font-size:17px;line-height:1}
.wavepill .bmark{font-style:normal;font-size:8.5px;font-weight:800;letter-spacing:.08em;color:var(--acc);
  border:1px solid color-mix(in srgb,var(--acc) 45%,transparent);border-radius:99px;padding:1px 6px;align-self:center}
.wavepill .bmark.now{color:var(--bad);border-color:var(--bad);animation:pulse 1.2s ease-in-out infinite}
.barline{display:flex;align-items:center;gap:7px}
.barline .bl{font-size:8.5px;letter-spacing:.12em;font-weight:800;color:var(--ink2);width:58px;flex:0 0 auto}
.barline .bar{flex:1}
.barline .bv{font-size:9.5px;font-weight:800;flex:0 0 auto;min-width:76px;text-align:right;color:var(--ink)}
.ctxstrip{display:flex;align-items:center;gap:8px;font-size:9.5px;font-weight:800;letter-spacing:.07em;color:var(--ink2)}
.ctxstrip .ctx{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctxstrip .arch{font-style:normal;color:var(--acc)}
.speedpills{display:flex;gap:4px;flex:0 0 auto}
.spd{pointer-events:auto;padding:3px 9px;border-radius:9px;font-weight:800;font-size:10.5px;color:var(--ink2);background:var(--plate);border:1px solid var(--line)}
.spd.on{color:#07131f;background:linear-gradient(90deg,var(--acc),var(--acc2));border-color:transparent}
.famchip{display:flex;align-items:center;gap:6px;background:var(--plate);border:1px solid var(--line2);border-radius:999px;
  padding:3px 10px 3px 4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 8px #0006}
.famchip .fico{width:24px;height:24px;border-radius:99px;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:1px solid var(--line2);font-size:12px}
.famchip .ft{display:flex;flex-direction:column;align-items:flex-start;line-height:1.1}
.famchip .ft b{font-size:9px;letter-spacing:.08em}
.famchip .ft em{font-style:normal;font-size:8px;color:var(--ink2)}
#sheet.on{display:flex}
#modals.on{display:flex}
#bossbar.on{display:block}
.navcard{text-align:left;width:100%;display:block}
.card.lux,.row.card.lux{background:linear-gradient(180deg,#1C2230,#14171F);border-color:color-mix(in srgb,var(--acc) 30%,var(--line2))}
.row.card.locked{opacity:.55}
.acts{margin-top:10px}
.row.card{margin-bottom:9px}
.card .fill b{display:block}
.card .fill .sub{display:block}
.path.locked{opacity:.6}
.perk-pick{display:flex;gap:10px}
.perk-card{flex:1;background:var(--panel2);border:1.5px solid var(--line2);border-radius:14px;padding:14px 12px;
  display:flex;flex-direction:column;gap:6px;text-align:left;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.perk-card b{font-size:14px}
.perk-card span{font-size:11.5px;color:var(--ink2)}
.perk-card:active{border-color:var(--acc);transform:scale(.98)}
.boon-cd{font-size:11.5px;color:var(--ink2);margin-bottom:8px}
.while-away{display:flex;flex-direction:column;gap:6px}
.while-away .wa-hero{font-size:16px;font-weight:800;letter-spacing:.04em}
.wa-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0;color:var(--ink2)}
.wa-row b{color:var(--ink)}
.gate-brand{font-family:Georgia,'Times New Roman',serif;font-variant:small-caps;letter-spacing:.3em;font-size:32px;text-align:center;
  background:linear-gradient(180deg,var(--gilt),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.gate-story{color:var(--ink2);font-size:13px;text-align:center}
.theme-pick{position:relative}
.theme-pick.def::after{content:'DEFAULT';position:absolute;right:10px;top:10px;font-size:8px;font-weight:800;letter-spacing:.1em;
  color:var(--acc);border:1px solid color-mix(in srgb,var(--acc) 45%,transparent);border-radius:99px;padding:2px 6px}
/* ---------- placement / speed / misc overlays ---------- */
#speedCtl{display:none} /* speed lives in the HUD context strip (FINAL design) */
#placeHint{position:absolute;left:50%;transform:translateX(-50%);bottom:150px;z-index:23;background:var(--plate);border:1px solid var(--acc);
  border-radius:12px;padding:8px 16px;font-size:12px;font-weight:700;display:none;box-shadow:0 2px 8px #0006}
#placeHint.on{display:block}
#modeFly{position:absolute;pointer-events:none;left:50%;top:38%;transform:translate(-50%,-50%);z-index:24;font-size:26px;font-weight:900;
  letter-spacing:.1em;opacity:0;text-shadow:0 0 24px currentColor}
.reduceMotion *{animation-duration:.001s!important;transition-duration:.001s!important}
.lowFlash .toast,.lowFlash .ult.ready{box-shadow:none!important}
#rotHint{display:none}
@media (min-width:1024px){ /* desktop web: same language breathing into the width (one codebase) */
  #hud{left:50%;right:auto;transform:translateX(-50%);width:min(920px,96vw)}
  #dock{left:50%;right:auto;transform:translateX(-50%);width:min(1100px,98vw)}
  .tcard{width:74px}.tcard canvas{width:44px;height:44px}
  .tcard .tn{font-size:10px}.tcard .tc{font-size:10.5px}
  #tabbar button{font-size:11px}
  #sheet{left:auto;right:0;top:0;width:min(540px,44vw);border-top-left-radius:var(--rad-l);
    border-bottom-left-radius:0;border-top-right-radius:0;border-left:1px solid var(--line2)}
}
@media (orientation:landscape) and (max-height:460px){
  #hud{flex-direction:row;align-items:flex-start}
  #dock #tray{padding:4px}
  .tcard{width:56px}.tcard canvas{width:32px;height:32px}
  #tabbar{padding-bottom:calc(var(--sab) + 2px)}

<script>
/* ==== src/01-core.js ==== */
'use strict';
/* SPIREBOUND — core: namespace, BigNumber, format, RNG, style constants, utils */
const G = window.G = {v: 1, dev: /[?&]dev\b/.test(location.search)};

/* ================= BigNumber — mantissa/exponent; ALL unbounded game-state uses this.
   {m,e}: m in [1,10) or m===0. Native Number ONLY for positions/dt/bounded scalars. */
const BN = G.BN = (() => {
  const mk = (m, e) => {
    if (!isFinite(m) || m <= 0) return {m: 0, e: 0};
    e = e | 0;
    while (m >= 10) { m /= 10; e++; }
    while (m < 1) { m *= 10; e--; }
    return {m, e};
  };
  const from = n => {
    n = +n;
    if (!isFinite(n) || n <= 0) return {m: 0, e: 0};
    const e = Math.floor(Math.log10(n));
    return mk(n / Math.pow(10, e), e);
  };
  const isZ = a => !a || a.m === 0;
  const add = (a, b) => {
    if (isZ(a)) return isZ(b) ? {m:0,e:0} : {m:b.m,e:b.e};
    if (isZ(b)) return {m:a.m,e:a.e};
    if (a.e - b.e > 15) return {m:a.m,e:a.e};
    if (b.e - a.e > 15) return {m:b.m,e:b.e};
    if (a.e >= b.e) return mk(a.m + b.m * Math.pow(10, b.e - a.e), a.e);
    return mk(b.m + a.m * Math.pow(10, a.e - b.e), b.e);
  };
  const sub = (a, b) => { // clamped at 0 — game quantities never negative
    if (isZ(b)) return isZ(a) ? {m:0,e:0} : {m:a.m,e:a.e};
    if (isZ(a) || cmp(a, b) <= 0) return {m: 0, e: 0};
    if (a.e - b.e > 15) return {m:a.m,e:a.e};
    return mk(a.m - b.m * Math.pow(10, b.e - a.e), a.e);
  };
  const mul = (a, b) => (isZ(a) || isZ(b)) ? {m:0,e:0} : mk(a.m * b.m, a.e + b.e);
  const mulN = (a, n) => (isZ(a) || !isFinite(n) || n <= 0) ? {m:0,e:0} : mk(a.m * n, a.e);
  const div = (a, b) => (isZ(a) || isZ(b)) ? {m:0,e:0} : mk(a.m / b.m, a.e - b.e);
  const cmp = (a, b) => {
    const az = isZ(a), bz = isZ(b);
    if (az && bz) return 0; if (az) return -1; if (bz) return 1;
    if (a.e !== b.e) return a.e > b.e ? 1 : -1;
    return a.m === b.m ? 0 : (a.m > b.m ? 1 : -1);
  };
  const gte = (a, b) => cmp(a, b) >= 0;
  // base^p for native base>0, p can be large — never overflows (log-space)
  const powN = (base, p) => {
    if (base <= 0) return {m:0,e:0};
    const lg = p * Math.log10(base);
    const e = Math.floor(lg);
    return mk(Math.pow(10, lg - e), e);
  };
  const pow = (a, p) => { // BN^native
    if (isZ(a)) return {m:0,e:0};
    const lg = p * (Math.log10(a.m) + a.e);
    const e = Math.floor(lg);
    return mk(Math.pow(10, lg - e), e);
  };
  const log10 = a => isZ(a) ? -Infinity : Math.log10(a.m) + a.e;
  const toNum = a => isZ(a) ? 0 : (a.e > 300 ? 1e300 : a.m * Math.pow(10, a.e));
  const ratio = (a, b) => { // native a/b clamped [0, 1e6] — for bars/AI only
    if (isZ(a)) return 0; if (isZ(b)) return 1e6;
    const d = a.e - b.e;
    if (d > 6) return 1e6; if (d < -7) return 0;
    return Math.min(1e6, (a.m / b.m) * Math.pow(10, d));
  };
  const max = (a, b) => gte(a, b) ? a : b;
  const min = (a, b) => gte(a, b) ? b : a;
  const clone = a => ({m: a ? a.m : 0, e: a ? a.e : 0});
  const san = a => (a && typeof a.m === 'number' && isFinite(a.m) && typeof a.e === 'number' && isFinite(a.e)) ? mk(a.m, a.e) : {m:0,e:0};
  const Z = () => ({m:0,e:0}), ONE = () => ({m:1,e:0});
  return {mk, from, add, sub, mul, mulN, div, cmp, gte, isZ, pow, powN, log10, toNum, ratio, max, min, clone, san, Z, ONE};
})();

/* ================= number formatting: K/M/B/T → letter pairs → sci; user toggle */
G.fmt = (a, forceSci) => {
  if (typeof a === 'number') a = BN.from(a);
  if (BN.isZ(a)) return '0';
  const e = a.e, sci = forceSci || (G.S && G.S.opt && G.S.opt.notation === 'sci');
  if (e < 3) { const n = a.m * Math.pow(10, e); return n >= 100 ? '' + Math.round(n) : (Math.round(n * 10) / 10 + ''); }
  if (sci || e >= 15 + 26 * 3) {
    return (Math.round(a.m * 100) / 100) + 'e' + e;
  }
  const T3 = Math.floor(e / 3), r = e - T3 * 3, v = a.m * Math.pow(10, r);
  const s = v >= 100 ? Math.round(v) + '' : (Math.round(v * 10) / 10) + '';
  if (T3 <= 4) return s + ['', 'K', 'M', 'B', 'T'][T3];
  const i = T3 - 5; // aa=1e15
  return s + String.fromCharCode(97 + ((i / 26) | 0)) + String.fromCharCode(97 + (i % 26));
};
G.fmtTime = s => {
  s = Math.max(0, Math.floor(s));
  if (s < 60) return s + 's';
  if (s < 3600) return ((s / 60) | 0) + 'm ' + (s % 60 ? (s % 60) + 's' : '').trim();
  if (s < 86400) return ((s / 3600) | 0) + 'h ' + (((s % 3600) / 60) | 0) + 'm';
  return ((s / 86400) | 0) + 'd ' + (((s % 86400) / 3600) | 0) + 'h';
};

/* ================= seeded RNG (deterministic content; UI/gameplay rolls use G.rng) */
G.hash = str => { let h = 1779033703 ^ str.length; for (let i = 0; i < str.length; i++) { h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h << 13 | h >>> 19; } return (h >>> 0); };
G.mulberry = seed => () => { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let t = Math.imul(seed ^ seed >>> 15, 1 | seed); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
G.rng = G.mulberry((Math.random() * 2 ** 31) | 0);
G.rand = (a, b) => a + G.rng() * (b - a);
G.pick = arr => arr[(G.rng() * arr.length) | 0];
G.chance = p => G.rng() < p;

  themes: { // Aurora Veil = the authored DEFAULT identity; alternates are seasonal (chairman ruling)

G.bus = (() => { const m = {}; return {
  on: (k, f) => { (m[k] = m[k] || []).push(f); },
  emit: (k, d) => { const l = m[k]; if (l) for (let i = 0; i < l.length; i++) l[i](d); }
};})();
G.dayMs = 86400000;
G.now = () => Date.now();
/* game-date: real date clamped monotonic vs save.maxDateReached (anti clock-cheat, §B) */

  const n = G.now();
  if (G.S && G.S.time) { if (n > G.S.time.maxDateReached) G.S.time.maxDateReached = n; return Math.max(n, G.S.time.maxDateReached); }
  return n;
};

/* SPIREBOUND data: maps & tiers — 20 tiers × 3 maps (A economy / B skill / C gauntlet),
   hard-mode twists, locked scaling curves, seeded path generator (6 archetypes) + power nodes.
   ENGINE CONTRACT:
   Tier row: {t,id,nm,biome,soil,maps:[{id,nm,arch,slot,accent?}],bossNm,premMul,hm:{id,...params},hmD,gate?}
   - Signature boss mechanics for R50/R100 = G.D.bosses[(t-1)%12], biome-skinned (LOCKED call #2);
     bossNm is the tier's flavor name for that skin. Every 10th non-gate round = 'ancientdragon'.
   - premMul = the tier table's reward× column → premium-drop/milestone-chest densifier (elite Prisms/
     Shards + chest scale). The ESSENCE economy uses G.D.curves (LOCKED call #1) — not premMul.
   Curves (log10-space so Freeplay never overflows; BN via bnFromLog10):
     hpLog10(r,t)  = piecewise §L: 1.055^r→100 · 1.030→1k · 1.018→∞ ×1.4 spike/500 past 1k; ×2.85^(t-1); boss +log10(20)
     rwLog10(r,t)  = 5×1.13^r × 3.4^(t-1)
   Hard mode overlay: ×2.2 HP, ×1.5 speed, +1 boss ability + the tier twist (G.D.hardTwists).
   genMap(map,seed,tier) → {entrances:[[{x,y}..]..],merged:[{x,y}..],spire:{x,y},nodes:[{x,y,type,openAt?,rail?}],
                            zones:[{k:'soil|ley|void|reclaim',x,y,r,el?,cost?}]}  (deterministic per seed) */
G.D = G.D || {};
(() => {
const L10 = Math.log10;
G.D.curves = {
  hpLog10: (r, t, boss) => {
    let l = 1; // log10(10)
    if (r <= 100) l += r * L10(1.055);
    else if (r <= 1000) l += 100 * L10(1.055) + (r - 100) * L10(1.030);
    else l += 100 * L10(1.055) + 900 * L10(1.030) + (r - 1000) * L10(1.018) + Math.floor((r - 1000) / 500) * L10(1.4);
    l += (t - 1) * L10(2.85);
    if (boss) l += L10(20);
    return l;
  },
  rwLog10: (r, t) => L10(5) + r * L10(1.13) + (t - 1) * L10(3.4),
  bnFromLog10: l => ({m: Math.pow(10, l - Math.floor(l)), e: Math.floor(l)}),
  hard: {hp: 2.2, spd: 1.5, extraAbility: 1},
  assist: {maxRound: 50, dmgBoost: r => Math.max(0, .6 * (1 - r / 45))}, // §L: strong R1 → ~0 by R45
  milestonesHard: [50, 100, 150, 200, 300, 500, 1000],
  milestonesNormal: [100, 150, 200, 300, 500, 1000] // MAPS-VERDICT #12: fills the R100-1k dead-zone for standard (non-hard) mode
};
/* MAPS-VERDICT #11: G.D.arc(r,t) — render-only phase helper; 0 = fresh lane, 1 = deep marathon.
   combatDim flags the render loop to dim non-combat background detail near an x1.4/500 milestone
   wall; timeArc is the tint-lerp position. No sim/follower read of this, ever. */
G.D.arc = (r, t) => {
  const p = Math.min(1, L10(1 + r) / L10(5001));
  const combatDim = r > 900 && (r % 500) < 25;
  return {p, timeArc: p, combatDim};
};

/* MAPS-VERDICT #14: G.D.perfBudget — the taste/perf line as a data contract, read by BOTH sim and
   render so render can never drift past it. segCap is the same cap genMap's #4 assert enforces. */
G.D.perfBudget = {lanes: 5, ctrlPts: 40, nodes: 6, zones: 10, particles: 256, enemies: 100, segCap: 16, singleStaticBake: true, perEnemyGlow: false};
/* ================= seeded path generator — 6 archetypes + power nodes ================= */
const ARCHS = ['spiral','maze','branch','longexp','choke','multi'];
G.D.genMap = (map, seed, tier) => {
  const R = G.mulberry((seed|0) ^ 0x51F3B00D);
  const j = (a,b) => a + R() * (b - a);
  const W = 1000, H = 620, sp = {x: W * j(.5,.6), y: H * j(.44,.54)};
  let arch = map.arch === 'rot' ? ARCHS[(seed >>> 3) % 6] : map.arch;
  const ent = [], zones = [], nodes = [];
  const pt = (x,y) => ({x, y});
  const jit = p => pt(p.x + j(-18,18), p.y + j(-14,14));
  let merged = [];
  if (arch === 'branch') {
    const m = pt(W*.32, H*j(.36,.46));
    ent.push([pt(-20,H*j(.1,.2)), jit(pt(W*.12,H*.18)), jit(pt(W*.22,H*.28)), m]);
    ent.push([pt(-20,H*j(.8,.92)), jit(pt(W*.12,H*.82)), jit(pt(W*.22,H*.6)), m]);
    merged = [m, jit(pt(W*.44,H*.28)), jit(pt(W*.58,H*.25)), jit(pt(W*.7,H*.36)), jit(pt(W*.72,H*.52)), jit(pt(W*.62,H*.64)), pt(sp.x, sp.y + 46)];
  } else if (arch === 'spiral') {
    const seg = []; // MAPS-VERDICT #3: coils 9->12, retuned r0/step so radius stays positive throughout
    const coils = 12, r0 = 360, rStep = 27;
    for (let i = 0; i < coils; i++) {
      const a = -Math.PI * .9 + i * .5, r = r0 - i * rStep;
      seg.push(pt(sp.x + Math.cos(a) * r, sp.y + Math.sin(a) * r * .74));
    }
    seg.unshift(pt(-20, seg[0].y)); seg.push(pt(sp.x, sp.y + 46));
    ent.push(seg.slice(0, 2)); merged = seg.slice(1);
  } else if (arch === 'maze') {
    const rows = 6, seg = [pt(-20, H*.16)]; // MAPS-VERDICT #3: rows 4->6; first 4 rows keep original spacing, 2 extra rows compressed below (retuned amplitude vs the 4-row original to avoid a boss-spawn/tower-range collision on seeded placement)
    for (let i = 0; i < rows; i++) {
      const yFrac = i < 4 ? .16 + i * .2 : .76 + (i - 3) * .06, y = H * yFrac, l = i % 2 === 0;
      seg.push(jit(pt(l ? W*.65 : W*.25, y)));
      if (i < rows - 1) { const nStep = i < 3 ? .2 : .06; seg.push(jit(pt(l ? W*.65 : W*.25, y + H*nStep))); }
    }
    seg.push(pt(sp.x, sp.y + 46));
    ent.push(seg.slice(0, 2)); merged = seg.slice(1);
  } else if (arch === 'longexp') { // MAPS-VERDICT fix #2: ~9 waypoints, monotonic ramp — the LONG slot
    const seg = [pt(-20, H*j(.1,.16)), jit(pt(W*.16,H*.2)), jit(pt(W*.34,H*.28)), jit(pt(W*.52,H*.34)),
      jit(pt(W*.72,H*.42)), jit(pt(W*.88,H*.54)), jit(pt(W*.74,H*.68)), jit(pt(W*.56,H*.74)), pt(sp.x, sp.y + 46)];
    ent.push(seg.slice(0, 2)); merged = seg.slice(1);
  } else if (arch === 'choke') {
    const c1 = pt(W*.44, H*.42), c2 = pt(W*.5, H*.52); // the corridor
    ent.push([pt(-20,H*.14), jit(pt(W*.18,H*.2)), c1]);
    ent.push([pt(-20,H*.88), jit(pt(W*.18,H*.78)), c1]);
    merged = [c1, c2, jit(pt(W*.62,H*.58)), pt(sp.x, sp.y + 46)];
    zones.push({k:'void', x:W*.44, y:H*.2, r:120}, {k:'void', x:W*.44, y:H*.76, r:120}); // walls that make the choke
  } else { // multi
    const n = 3 + ((seed >>> 5) % 2), m = pt(W*.5, H*.5);
    for (let i = 0; i < n; i++) {
      const a = -Math.PI/2 + i * (Math.PI * 2 / n) + j(-.2,.2);
      ent.push([pt(m.x + Math.cos(a) * 560, m.y + Math.sin(a) * 380), jit(pt(m.x + Math.cos(a) * 300, m.y + Math.sin(a) * 210)), m]);
    }
    merged = [m, pt(sp.x, sp.y + 46)];
  }
  /* MAPS-VERDICT #7: render-baked route accents — overpass/crossover are pure z-flag render data
     (no sim collision, follower untouched); U-turn kill-box is realized as two extra `merged`
     waypoints (within-archetype enrichment, still capped by segCap below). Derived from map.accent
     + a tier gate — never fires for the low tiers this harness pins, so it's exercised deliberately
     via manual QA at high tiers. Teleport/one-way stay DEFERRED (roadmap, not here). */
  const accents = [];
  if ((tier|0) >= 4) {
    if (ent.length >= 2) { // crossover: two entrance arms visually crossing near their shared merge
      const c = ent[0][ent[0].length - 1];
      accents.push({k: 'crossover', x: c.x + j(-20,20), y: c.y + j(-16,16), at: .18});
    }
    if ((tier|0) >= 8 && merged.length >= 4) { // overpass: a second render-only crossing further along merged
      const p = merged[Math.floor(merged.length * .4)];
      accents.push({k: 'overpass', x: p.x, y: p.y, at: .42});
    }
    if (map.accent === 'spiral') { // this map's stored accent flavor gets its own flourish, regardless of arch
      const p = merged[Math.floor(merged.length * .65)];
      accents.push({k: 'crossover', x: p.x, y: p.y, at: .65});
    }
    if ((tier|0) >= 12 && merged.length >= 3) { // U-turn kill-box: hairpin detour spliced into merged
      const insertAt = merged.length - 2, base = merged[insertAt], nxt = merged[insertAt + 1];
      const mx = (base.x + nxt.x) / 2, my = (base.y + nxt.y) / 2;
      const dx = nxt.x - base.x, dy = nxt.y - base.y, len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const kb1 = pt(mx + nx * 54 + j(-8,8), my + ny * 54 + j(-8,8));
      const kb2 = pt(mx - nx * 10, my - ny * 10);
      merged.splice(insertAt + 1, 0, kb1, kb2);
      accents.push({k: 'kbox', x: mx, y: my, at: .82});
    }
  }
  /* power nodes (§L: contested heart / safe periphery / locked; twin + mobile in high tiers) */
  /* MAPS-VERDICT #6: bias the contested node further along `merged` toward the spire-facing kill-zone
     as tier rises — t1 sits at the old midpoint, t20 sits ~82% of the way to the spire. */
  const tierBias = Math.min(1, Math.max(0, ((tier|0) - 1) / 19));
  const heartFrac = .5 + tierBias * .32;
  const heartIdx = Math.min(merged.length - 2, Math.max(0, Math.round(merged.length * heartFrac) - 1));
  const heart = merged[Math.max(0, heartIdx)];
  nodes.push({x: heart.x + j(-40,40), y: heart.y + j(-30,30), type: 'contested'});
  nodes.push({x: W * (R() < .5 ? j(.06,.14) : j(.86,.94)), y: H * j(.08,.2), type: 'safe'});
  nodes.push({x: sp.x + j(-90,90), y: sp.y + j(70,110), type: 'locked', openAt: 40});
  nodes.push({x: sp.x + j(-140,-90), y: sp.y + j(90,140), type: 'locked', openAt: Math.min(500, 100 + (tier|0) * 15)}); // MAPS-VERDICT #5: marathon-only second locked node — pure data, opens deep into a long run
  const ti = G.D.tiers[Math.min(19, Math.max(0, (tier|0) - 1))];
  if (ti.nodesTwin) nodes.push({x: heart.x + j(60,120), y: heart.y + j(-80,-30), type: 'twin', link: 0});
  if (ti.nodesMobile) { // MAPS-VERDICT #15: vary the mobile-node rail per seed instead of a fixed W*.3 path
    const railN = 3 + (R() < .5 ? 1 : 0), rail = [];
    for (let i = 0; i < railN; i++) rail.push(pt(W * j(.22,.78), H * j(.22,.78)));
    nodes.push({x: rail[0].x, y: rail[0].y, type: 'mobile', rail});
  }
  /* terrain zones: biome soil patch, a ley crack near the contested node, a reclaimable pocket */
  zones.push({k:'soil', x: merged[0].x + j(-60,60), y: merged[0].y + j(40,90), r: j(70,110), el: ti.soil});
  zones.push({k:'ley', x: nodes[0].x + j(-70,70), y: nodes[0].y + j(30,80), r: j(34,50)});
  zones.push({k:'reclaim', x: W * j(.7,.86), y: H * j(.12,.24), r: j(55,85), cost: 14});
  if (arch !== 'choke' && R() < .5) zones.push({k:'void', x: W * j(.1,.85), y: H * j(.65,.9), r: j(60,100)});
  /* MAPS-VERDICT #9/#10: corridor-clamp — nudge decorative placements (landmarks, deco, tier-scaled
     extra zones) off the merged/entrance path for legibility. Functional base zones above are left
     alone (soil/ley/reclaim/void carry gameplay meaning and are already placed off-path by design). */
  const segDist = (x, y, a, b) => { const dx = b.x-a.x, dy = b.y-a.y, len2 = dx*dx+dy*dy || 1;
    let t = ((x-a.x)*dx + (y-a.y)*dy) / len2; t = Math.max(0, Math.min(1, t));
    return Math.hypot(x - (a.x+t*dx), y - (a.y+t*dy)); };
  const corridorDist = (x, y) => { let d = Infinity;
    for (const arm of [merged, ...ent]) for (let i = 1; i < arm.length; i++) d = Math.min(d, segDist(x, y, arm[i-1], arm[i]));
    return d; };
  const offCorridor = (x, y, min) => { let p = {x, y}, tries = 0;
    while (corridorDist(p.x, p.y) < min && tries < 6) { p = {x: x + j(-80,80), y: y + j(-70,70)}; tries++; }
    return p; };
  /* MAPS-VERDICT #9: landmarks:[{x,y,type,name}] — 2-4 signature props per map, keyed off this tier's
     biome via G.D.biomeArt, so biome:'water' reads as Drowned Cloister rather than a palette swap. */
  const biomeArtT = G.D.biomeArt[ti.biome] || G.D.biomeArt.dawn;
  const landmarks = [];
  const lmCount = 2 + ((seed >>> 7) % 3);
  for (let i = 0; i < lmCount; i++) {
    const raw = offCorridor(W * j(.08,.92), H * j(.08,.92), 60);
    const lm = biomeArtT.landmarkSet[i % biomeArtT.landmarkSet.length];
    landmarks.push({x: raw.x, y: raw.y, type: lm.type, name: lm.name});
  }
  /* MAPS-VERDICT #10: tier-scaled detail — +1 zone/props ~every 4 tiers, plus a data-only `deco`
     clutter layer (kind is freeform/cosmetic, unlike zone.k which stays inside the 4 buildable kinds
     terrain logic already understands). All new decoration stays off the merged corridor. */
  const extraCount = Math.floor(Math.min(19, Math.max(0, (tier|0) - 1)) / 4);
  const EXTRA_KINDS = ['soil','ley','reclaim'];
  for (let i = 0; i < extraCount; i++) {
    const p = offCorridor(W * j(.1,.9), H * j(.1,.9), 70), kind = EXTRA_KINDS[i % EXTRA_KINDS.length];
    const zn = {k: kind, x: p.x, y: p.y, r: j(30,55)};
    if (kind === 'soil') zn.el = ti.soil; if (kind === 'reclaim') zn.cost = 14;
    zones.push(zn);
  }
  /* MAPS-VERDICT #13: lod/priority per node & zone — render culls periphery first at 4x/high-speed;
     route + contested node + boss lane (rendered separately, not a node/zone) always draw. */
  const NODE_LOD = {contested: 0, mobile: 0, twin: 1, locked: 2, safe: 3};
  nodes.forEach(n => { n.lod = NODE_LOD[n.type] ?? 3; n.priority = (n.type === 'contested' || n.type === 'mobile') ? 'always' : 'lod'; });
  zones.forEach(z => { z.lod = z.k === 'void' ? 1 : 2; z.priority = 'lod'; });
  const deco = [];
  const decoCount = 3 + extraCount * 2;
  const DECO_KINDS = ['rock','banner','ruin','crystal','bones','moss','ember','ice-shard'];
  for (let i = 0; i < decoCount; i++) {
    const p = offCorridor(W * j(.05,.95), H * j(.05,.95), 46);
    deco.push({x: p.x, y: p.y, kind: DECO_KINDS[(i + (seed >>> 2)) % DECO_KINDS.length], el: ti.soil});
  }
  /* MAPS-VERDICT #11/#12: beats:[{atRound,kind}] — per-tier chapter markers anchored to
     milestonesNormal (100/150/200/300/500/1000) + the x1.4/500 spike walls past 1000, plus this
     tier's gate (ascension/transcendence/apex) as a chapter-open beat. Render reads G.D.arc(round,
     tier) each frame for the live combatDim/timeArc cues; this array is the static per-map bake. */
  const beats = G.D.curves.milestonesNormal.map(m => ({atRound: m, kind: 'milestone'}));
  for (let m = 1500; m <= 5000; m += 500) beats.push({atRound: m, kind: 'spike'});
  if (ti.gate) beats.push({atRound: 1, kind: 'gate:' + ti.gate});
  /* MAPS-VERDICT #4: bound cosmetic length — sim `merged` must stay <=16 segments (perfBudget.segCap);
     Catmull-Rom smoothing (08-render) is RENDER-only over this coarse sim polyline, never fed back into
     sim. Enemy movement (07-sim buildLanes/lanePos) walks a cached cumulative-length segment index —
     bounded by segCap, so it's an O(1)-ish bounded step, never a full-path rescan. */
  const segCap = (G.D.perfBudget && G.D.perfBudget.segCap) || 16; // item #14 defines the real budget; fallback keeps this self-contained
  if (merged.length - 1 > segCap && typeof console !== 'undefined')
    console.warn('MAPS-VERDICT #4: merged exceeds segCap', arch, merged.length - 1);
  /* MAPS-VERDICT fix #1 (keystone): pathLenPx — total + per-lane arc length; 07-sim analytic
     reads exposure = pathLenPx/speed so waypoint growth can never drift the LOCKED HP curves. */
  const arc = pts => { let L = 0; for (let i = 1; i < pts.length; i++) L += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y); return L; };
  const mLen = arc(merged), laneLens = ent.map(e => arc(e) + mLen - 0); // entrance arm + shared merged run
  /* MAPS-VERDICT #8: tag static (bake-once) vs dynamic (per-frame) render data + a staticKey so
     08-render bakes the static layer once and only re-bakes on map/tier change or an HM land-loss

     their original top-level shape untouched; this just groups references to what already exists. */

 {s:5,nm:'Roots of the World',tx:'Green came back wrong. It came back angry. Vines took the siege-roads overnight and the treants stood where the enemy columns should have been — facing the Spire.',st:'Not everything that grows toward the light loves it.'},

 {s:7,nm:'The Long Noon',tx:'For nine days the Solar Titan burned a false noon over the terrace — light without warmth, day without end. The people wept at first, then squinted, then understood: this too was a siege.',st:'Too much light is just another way to blind you.'},

 {s:8,nm:'Convergence',tx:'Five elements, one keep, and a hydra with a head for each. The Prism Hydra did not want the Spire destroyed — it wanted it divided, one color at a time.',st:'A light split five ways casts no shadow — and no dawn.'},
 {s:8,nm:'The Shape of the Hollow',tx:'In the hydra’s dead eyes the keepers finally saw it: every boss of the Long Night bore the same crownless mark. Servants. All of them, servants.',st:'The Hollow King has never once come himself.'},
 {s:9,nm:"Hollow's Eve",tx:'On the year’s darkest eve the dead walked politely, as if invited. They queued at the light’s edge and looked up at the Spire with something like homesickness.',st:'Pity them after you stop them.'},
 {s:9,nm:'The Dread Bargain',tx:'The Dread Sovereign offered terms: surrender the Spire whole, and every soul in it walks free. The keepers asked for a night to decide, and spent it sharpening.',st:'Some bargains are threats wearing manners.'},
 {s:10,nm:'The Forge Wakes',tx:'Deep under the terrace, the Great Forge lit itself for the first time in three hundred years. The anvils remembered their work. The runes remembered their war.',st:'Weapons dream. This one is waking up.'},
 {s:10,nm:'Runewar',tx:'The Forgebreaker came to unmake what the Forge remembered — every rune, every ward, every letter of the old defiance. It brought a hammer that erases.',st:'Hold the line, or be edited out of it.'},

/* ================= damage pipeline (BN) ================= */
const spDR = R => Math.min(.9,(R.mods.spireDR||0)+(R.twDR||0));          // codex + Sanctum-class towers
const dmgTo = (R,e,raw,src) => { // src {el, heavy, dot, ult, tower}
  if(!e.alive) return BN.Z();
  const row=e.d;
  if(row.fx.immune&&src.el===row.fx.immune) return BN.Z();
  if(e.camo&&!R._detect&&!src.dot) return BN.Z();
  if(e.phased&&!src.dot&&!src.ult) return BN.Z();                        // Phase Wisp untargetable window
  if(e===R.boss&&R.boss.immuneEl&&src.el===R.boss.immuneEl) return BN.Z();
  if(e===R.boss&&R.boss.absorbUntil&&R.t<R.boss.absorbUntil&&!src.ult) return BN.Z(); // Devour window
  if(e===R.boss&&R.boss.immuneDot&&src.dot) return BN.Z(); // post-Molt
  let mul=e.vuln*(1+.06*Math.min(10,e.shred));
  if(row.fx.physRes&&!src.dot) mul*=.4;                                  // call #12
  if(row.tags&&row.tags.includes('fortified')&&!src.heavy&&!src.armorIg){ // small rapid hits halved
    if(BN.ratio(raw,e.maxhp)<D().tags.fortified.smallHitP) mul*=D().tags.fortified.smallHitMul; }
  if(e===R.boss){ const b=R.boss;
    if(!b._engaged){ b._engaged=1;                                       // first blood: boss opens its kit fast
      for(const id in b.moveT){ const mv=b.moves.find(m=>m.id===id);
        if(mv&&mv.cd)b.moveT[id]=Math.min(b.moveT[id],R.t+1.2+G.rng()*.8); } }
    if(src.el){ if(src.el===b._elPrev)b._elSpam=(b._elSpam|0)+1; else {b._elPrev=src.el;b._elSpam=0;} b._lastEl=src.el; }
    if(b.reflectUntil&&R.t<b.reflectUntil&&src.tower){                   // Shield Bash: hits bounce, jam the shooter
      src.tower.disabledUntil=Math.max(src.tower.disabledUntil||0,R.t+1.5); return BN.Z(); }
    if(b.interceptN>0&&src.tower&&!src.ult){ b.interceptN--; return BN.Z(); } // Comet Guard eats direct hits
    if(b.armorOn){ const qual=src.heavy||src.ult||src.el==='fire';       // Ice Armor: shatterBy burst/fire
      if(qual){ b.armorHp=BN.sub(b.armorHp,raw); e.lastHit=R.t;
        if(BN.isZ(b.armorHp)){ b.armorOn=0; b.reformAt=b.reformAfter?R.t+b.reformAfter:0; G.bus.emit('bossArmor',{b,broken:1}); }

    if(b.shieldArc&&src.tower&&G.chance(b.shieldArc.arc||.5)) mul*=1-(b.shieldArc.dr||.5); // orbiting crown
    if(b.adaptEl&&src.el===b.adaptEl) mul*=1-(b.adaptDr||.7);            // Adaptive Plating (per-element)

    d=BN.sub(d,e.shield); e.shield=BN.Z(); }
  e.hp=BN.sub(e.hp,d); e.lastHit=R.t; R.stats.dmg=BN.add(R.stats.dmg,d);
  if(BN.isZ(e.hp)&&e!==R.boss) kill(R,e,src); // boss death is resolved by bossTick (credit + shards)
  return d;
};
const kill = (R,e,src) => { if(!e.alive)return; e.alive=0; R.kills++; R.killsRound++;
  G.S.killsLife=BN.add(G.S.killsLife,BN.ONE());
  const row=e.d;
  if(src&&src.tower){const ek=G.S.stats.elKills=G.S.stats.elKills||{};ek[src.tower.tw.el]=(ek[src.tower.tw.el]|0)+1;}
  const gfx=R.mods.gfx;                                                  // glyph: death bursts
  if(gfx&&gfx.deathBurst&&src&&src.tower&&G.chance(.25))
    queryR(R,e.x,e.y,60).forEach(o=>{if(o!==e&&o.alive)dmgTo(R,o,BN.mulN(e.maxhp,gfx.deathBurst),{el:src.tower.tw.el,tower:src.tower});});
  if(R.daily&&(R.daily.ids||[]).includes('splitall')&&!e._child){for(let i=0;i<2;i++){const c=spawn(R,'wisp',e.lane,1);c.dist=e.dist;}}
  if(row.fx.split){for(let i=0;i<row.fx.split.n;i++){const c=spawn(R,row.fx.split.of);c.dist=e.dist+i*8;c.lane=e.lane;}}
  if(row.fx.burstNear&&e.distToSpire<row.fx.burstNear.dist){for(let i=0;i<row.fx.burstNear.n;i++){const c=spawn(R,row.fx.burstNear.of);c.dist=e.dist;c.lane=e.lane;}}
  if(src&&src.tower&&src.tower.fx&&src.tower.fx.spreadOnDeath){ const sk=src.tower.fx.spreadOnDeath.s, sv=e.st[sk];
    if(sv) queryR(R,e.x,e.y,70).forEach(o=>{ if(o.alive&&o!==e) o.st[sk]={dps:sv.dps,t:sv.t,el:sv.el}; }); }
  const share=BN.mulN(R._rw,(BN.ratio(e.maxhp,R._waveHp)||.02)*.7*(e.elite?3:1));
  const gain=BN.mul(share,R.combo);
  R.essence=BN.add(R.essence,BN.mulN(gain,R.mods.essGain*G.D.modes[R.mode].mult*(R.eventLive?1.15:1)));
  const cshare=G.D.modes[R.mode].combo; if(cshare>0){R.comboK++;
    R.combo=BN.powN(1+.0003*(G.S.prestige.ascensions+1)*cshare,R.comboK);}
  if(e.elite){G.S.prisms+=1+((R.tier/4)|0); if(G.chance(.3)){G.S.shards++;G.S.stats.shardsLife=(G.S.stats.shardsLife|0)+1;}}
  const cores=(G.S.cores[src&&src.tower?src.tower.tw.id:'spire']||0)+1;
  G.S.cores[src&&src.tower?src.tower.tw.id:'spire']=cores;

/* ================= status engine ================= */
const applyOnHit = (R,t,e,dealt) => { const fx=t.fx||{};
  const put=(k,o)=>{e.st[k]=o};
  if(fx.burn) put('burn',{dps:BN.mulN(t.dmg,fx.burn.p),t:fx.burn.t,el:'fire'});
  if(fx.poison) put('poison',{dps:BN.mulN(t.dmg,fx.poison.p),t:fx.poison.t,el:'nature'});
  if(fx.bleed) put('bleed',{dps:BN.mulN(t.dmg,fx.bleed.p),t:fx.bleed.t,el:'phys'});
  const ctrlImm=e.d.fx.ctrlUltImmune;                                    // Ray: immune to control + ult-CC
  if(fx.slow&&!ctrlImm&&!(e.d.tags&&e.d.tags.includes('frostward'))){e.slow=Math.max(e.slow,Math.min(.85,fx.slow.p*(1+(R.mods.slowPow||0))));e.slowT=Math.max(e.slowT,fx.slow.t);}
  if(fx.freeze&&!ctrlImm&&!(e.d.tags&&e.d.tags.includes('frostward'))&&G.chance(fx.freeze.p)) e.frz=Math.max(e.frz,fx.freeze.t);
  if(fx.stun&&!ctrlImm&&G.chance(fx.stun.p)) e.stun=Math.max(e.stun,fx.stun.t);
  if(fx.shred) e.shred=Math.min(10,e.shred+fx.shred.n);
  if(R.mods.shredExtra) e.shred=Math.min(10,e.shred+(R.mods.shredExtra|0)); // rune substat
  if(fx.curse) e.vuln=Math.max(e.vuln,1+fx.curse.p);
  if(fx.mark) e.vuln=Math.max(e.vuln,1+fx.mark.p);
  if(fx.exec&&BN.ratio(e.hp,e.maxhp)<fx.exec.p&&e!==R.boss) {e.hp=BN.Z();kill(R,e,{tower:t});}
  if(fx.maxhp) dmgTo(R,e,BN.mulN(e.maxhp,fx.maxhp.p),{dot:1});
  if(fx.splash){queryR(R,e.x,e.y,fx.splash.r).forEach(o=>{if(o!==e)dmgTo(R,o,BN.mulN(dealt,fx.splash.p),{el:t.tw.el,tower:t})})}
  if(fx.chain){let cur=e,n=fx.chain.n,f=1;while(n-->0){const cands=queryR(R,cur.x,cur.y,90).filter(o=>o!==cur&&o.alive);
    if(!cands.length)break;cur=cands[0];f*=fx.chain.f;dmgTo(R,cur,BN.mulN(dealt,f),{el:t.tw.el,tower:t});}}
};
const tickEnemy = (R,e,dt) => { if(!e.alive)return;
  for(const k of ['burn','poison','bleed']){const s=e.st[k]; if(s){s.t-=dt; dmgTo(R,e,BN.mulN(s.dps,dt),{dot:1,el:s.el}); if(s.t<=0)delete e.st[k];}}
  if(((e.d.tags&&e.d.tags.includes('regen'))||(R.daily&&(R.daily.ids||[]).includes('regenall')))
     &&R.t-e.lastHit>D().tags.regen.pause&&!e.st.poison)
    e.hp=BN.min(e.maxhp,BN.add(e.hp,BN.mulN(e.maxhp,(e.d.fx.regen?e.d.fx.regen.p:.03)*dt)));
  if(e.shield&&R.t-e.lastHit>D().tags.shielded.regenAfter) e.shield=BN.mulN(e.maxhp,D().tags.shielded.shieldHp);
  if(e.slowT>0){e.slowT-=dt; if(e.slowT<=0)e.slow=0;}
  if(e.frz>0)e.frz-=dt; if(e.stun>0)e.stun-=dt;

    if(e._phCd<=0){ e._phCd=efx.phase.cd; e.phased=R.t+efx.phase.t; }
    if(e.phased&&R.t>e.phased) e.phased=0; }
  if(efx.shed){ e._shCd=(e._shCd==null?efx.shed.every:e._shCd)-dt;
    if(e._shCd<=0){ e._shCd=efx.shed.every; const c=spawn(R,efx.shed.of,e.lane,1); c.dist=Math.max(0,e.dist-10); } }
  if(efx.atkTower||efx.disable||efx.snipe||efx.summon||efx.shieldAura||efx.healAura||efx.spdAura){
    e.abT=(e.abT||0)-dt;

      if(efx.atkTower||efx.disable){ const o=efx.atkTower||efx.disable; e.abT=o.cd||6;
        let bt=null,bd2=1e9; R.towers.forEach(tw=>{const d3=Math.hypot(tw.x-e.x,tw.y-e.y); if(d3<bd2){bd2=d3;bt=tw;}});
        if(bt&&bd2<220){ if(efx.disable){ bt.disabledUntil=Math.max(bt.disabledUntil||0,R.t+efx.disable.t); }
          else { bt.rtBuff=-efx.atkTower.p; bt.rtBuffUntil=R.t+efx.atkTower.t; G.sim.towerStats(R,bt); }
          G.bus.emit('enemyCast',{e,k:efx.disable?'disable':'atkTower',tw:bt}); } }
      if(efx.snipe){ e.abT=efx.snipe.cd; if(R.boss&&R.boss.alive)R._bossHurt=1;
        let d4=BN.mulN(e.maxhp,efx.snipe.p*.5*(1-spDR(R)));
        if(BN.gte(R.spire.ward,d4)) R.spire.ward=BN.sub(R.spire.ward,d4);
        else { d4=BN.sub(d4,R.spire.ward); R.spire.ward=BN.Z(); R.spire.hp=BN.sub(R.spire.hp,d4);
          if(BN.isZ(R.spire.hp)) return G.sim.endRun(R,'death'); }
        G.bus.emit('enemyCast',{e,k:'snipe'}); }
      if(efx.summon){ e.abT=efx.summon.cd;
        for(let i=0;i<efx.summon.n;i++){ const c=spawn(R,efx.summon.of,e.lane,1); c.dist=Math.max(0,e.dist-8-i*8); }
        G.bus.emit('enemyCast',{e,k:'summon'}); }
      if(efx.shieldAura) queryR(R,e.x,e.y,efx.shieldAura.r).forEach(o=>{ if(o!==e&&!o.shield) o.shield=BN.mulN(o.maxhp,efx.shieldAura.p); });
      if(efx.healAura) queryR(R,e.x,e.y,efx.healAura.r).forEach(o=>{ if(o!==e&&o.alive) o.hp=BN.min(o.maxhp,BN.add(o.hp,BN.mulN(o.maxhp,efx.healAura.p))); });
      if(efx.spdAura) queryR(R,e.x,e.y,efx.spdAura.r).forEach(o=>{ if(o!==e){ o._spdB=efx.spdAura.p; o._spdBT=R.t+1.2; } });
    } }
  let spd=e.spd*(1-Math.min(.85,e.slow+(R.mods.globalSlow||0)));

  if(e.frz>0||e.stun>0)spd=0;
  if(e.d.fx.berserk){const r=BN.ratio(e.hp,e.maxhp); if(r<e.d.fx.berserk.at)spd*=e.d.fx.berserk.spd;}
  if(e.d.fx.surge)spd=e.spd*(e.d.fx.surge.lo+(Math.sin(R.t*2+e.dist)*.5+.5)*(e.d.fx.surge.hi-e.d.fx.surge.lo));
  if(e.d.fx.tp){e.tpCd-=dt; if(e.tpCd<=0){e.dist+=90;e.tpCd=e.d.fx.tp.cd;}}
  e.dist+=spd*dt;
  const lane=R.lanes[e.lane%R.lanes.length], p=lanePos(lane,Math.max(0,e.dist));
  e.x=p.x;e.y=p.y; e.distToSpire=lane.len-e.dist;

const leak = (R,e) => { if(!e.alive)return; e.alive=0; R.leaks++;
  const p=e===R.boss?.4:(e.elite?.2:.12);                                  // call #13
  let d=BN.mulN(e.maxhp,p*(1-spDR(R))*(1-(R.mods.leakDR||0)));
  if(e.d.fx.drain){R.essence=BN.mulN(R.essence,.97);}
  R.enemies.forEach(v=>{ if(v.alive&&v.d.fx.lifesteal) v.hp=BN.min(v.maxhp,BN.add(v.hp,BN.mulN(d,v.d.fx.lifesteal.p))); }); // Vampire feeds on Spire wounds
  if(R.wardReflect&&R.t<R.wardReflect.until)                             // Prismatic Ward: reflect burst at the gates
    queryR(R,R.lay.spire.x,R.lay.spire.y,140).forEach(o=>{ if(o.alive) dmgTo(R,o,BN.mulN(d,R.wardReflect.p),{el:'ice',ult:1}); });

  else{d=BN.sub(d,R.spire.ward);R.spire.ward=BN.Z();R.spire.hp=BN.sub(R.spire.hp,d);}
  R.comboK=Math.max(0,R.comboK-8); R.combo=BN.powN(1+.0003*(G.S.prestige.ascensions+1),R.comboK);
  if(R.boss&&R.boss.alive)R._bossHurt=1;

  if(R.daily&&(R.daily.ids||[]).includes('sudden'))return G.sim.endRun(R,'death'); // sudden death: 1 leak
  if(BN.isZ(R.spire.hp)) G.sim.endRun(R,'death');

/* ================= towers firing ================= */
const towerTick = (R,t,dt) => { t.cd-=dt; if(t.cd>0)return;
  if(R.t<t.disabledUntil)return;
  const range=t.rg, pri=t.priority||'first', b=R.boss;
  let cands=queryR(R,t.x,t.y,range);
  if(b&&b.alive&&!b.untargetable&&Math.hypot(b.x-t.x,b.y-t.y)<=range
     &&!(b.fly&&!b.landed&&!t.fx.detect)) cands.push(b);                 // boss ALWAYS considered in range (AA-gated)
  if(!cands.length)return;
  let tgt=cands[0];
  if(pri==='boss'&&b&&cands.includes(b))tgt=b;
  else if(pri==='first')tgt=cands.reduce((a,c)=>a.dist>c.dist?a:c);
  else if(pri==='last')tgt=cands.reduce((a,c)=>a.dist<c.dist?a:c);
  else if(pri==='strong')tgt=cands.reduce((a,c)=>BN.gte(a.hp,c.hp)?a:c);
  t.cd=1/Math.max(.05,t.rt);
  if(t.fx.ramp){ if(t._rampTgt===tgt)t._rampN=(t._rampN|0)+1; else {t._rampTgt=tgt;t._rampN=0;} } // Focused Flame etc
  const gfx=R.mods.gfx||{};
  let crit=G.chance(t.critC);
  if(gfx.nthCrit){ t._shotN=((t._shotN|0)+1); if(t._shotN%gfx.nthCrit===0)crit=true; }     // glyph: every Nth crits
  if(R.daily&&(R.daily.ids||[]).includes('anticrit'))crit=false;
  let dmg=crit?BN.mulN(t.dmg,t.critD):t.dmg;
  if(t.fx.ramp)dmg=BN.mulN(dmg,1+Math.min(t.fx.ramp.cap||1,(t._rampN|0)*t.fx.ramp.p));
  if(t.fx.vsBoss&&tgt===b)dmg=BN.mulN(dmg,1+(t.fx.vsBoss.p||0));
  const hasStatus=(o,s)=>s==='freeze'?o.frz>0 : s==='slow'?o.slow>0 : s==='shield'?(o.shield&&!BN.isZ(o.shield))
       : s==='mark'?o.vuln>1 : s==='burn'?!!o.st.burn : !!o.st[s];
  if(t.fx.vsStatus&&hasStatus(tgt,t.fx.vsStatus.s))dmg=BN.mulN(dmg,1+t.fx.vsStatus.p);     // freeze→shatter combo core
  if(gfx.vsStatus)for(const v of gfx.vsStatus)if(hasStatus(tgt,v.s))dmg=BN.mulN(dmg,1+v.p); // glyph combos
  if(gfx.vsPack&&cands.length>=4)dmg=BN.mulN(dmg,1+gfx.vsPack);                             // glyph: Swarmward
  if(gfx.panic&&BN.ratio(R.spire.hp,R.spire.hpMax)<.35)dmg=BN.mulN(dmg,1+gfx.panic);        // glyph: panic surge
  const heavy=t.tw.b.ty==='lance'||t.tw.b.ty==='cannon'||(t.tw.b.d>=20);
  const dealt=dmgTo(R,tgt,dmg,{el:t.tw.el,tower:t,heavy,armorIg:t.fx.armorIg});
  applyOnHit(R,t,tgt,dealt);
  if(b&&b.overheatUntil&&R.t<b.overheatUntil) t.disabledUntil=R.t+(b.overheatPen||2.5); // Solar Flare punishes firing
  let extra=Math.floor(R.mods.multi||0)+(G.chance((R.mods.multi||0)%1)?1:0)
           +(t.fx.multi?(t.fx.multi.n||+t.fx.multi||0):0);               // tower multishot routes
  let pierce=t.pierce;
  if((extra>0||pierce>0)&&cands.length>1){for(const o of cands){if(o===tgt)continue;
    if(extra-->0||pierce-->0){const d2=dmgTo(R,o,BN.mulN(dmg,.8),{el:t.tw.el,tower:t,heavy});applyOnHit(R,t,o,d2);}else break;}}
  if(t.fx.beam&&cands.length>1){ const ang=Math.atan2(tgt.y-t.y,tgt.x-t.x); // Solar Lance: hit all on the ray
    cands.forEach(o=>{ if(o===tgt)return; let dd=Math.abs(Math.atan2(o.y-t.y,o.x-t.x)-ang);
      if(dd>Math.PI)dd=2*Math.PI-dd;
      if(dd<.16){const d2=dmgTo(R,o,BN.mulN(dmg,.7),{el:t.tw.el,tower:t,heavy:1});applyOnHit(R,t,o,d2);} }); }
  if(t.fx.zone&&(!t._zoneCd||R.t>t._zoneCd)){ t._zoneCd=R.t+2.5;         // Firestorm ground zones
    R.zones.push({k:'tzone',x:tgt.x,y:tgt.y,r:t.fx.zone.r||60,slow:t.fx.zone.slow||0,
      dps:BN.mulN(t.dmg,(t.fx.zone.dps||1)*.3),t:2.5,el:t.tw.el}); }
  G.bus.emit('shot',{t,tgt,crit,dealt});
};
const spireTick = (R,dt) => { const sp=R.spire; sp.cd-=dt;
  sp.ward=BN.min(sp.wardMax,BN.add(sp.ward,BN.mulN(sp.wardMax,.01*dt*(1+(R.twWard||0))))); // Aegis Beacon boosts
  sp.hp=BN.min(sp.hpMax,BN.add(sp.hp,BN.mulN(sp.hpMax,sp.regen*.001*dt)));
  if(sp.cd>0)return; const cx=R.lay.spire.x,cy=R.lay.spire.y;
  const cands=queryR(R,cx,cy,sp.rg*(1+sp.lvl.barrage*.01));
  if(R.boss&&R.boss.alive&&!R.boss.untargetable&&Math.hypot(R.boss.x-cx,R.boss.y-cy)<=sp.rg)cands.push(R.boss);
  if(!cands.length)return;
  sp.cd=1/(sp.rt*(1+sp.lvl.barrage*D().spire.paths[0].per.rt));
  const dmg=BN.mulN(sp.d,(1+sp.lvl.barrage*D().spire.paths[0].per.d)*Math.pow(1.22,R.roundLvl||0));
  const n=1+D().spire.paths[0].per.multiAt.filter(x=>sp.lvl.barrage>=x).length;
  for(let i=0;i<Math.min(n,cands.length);i++) dmgTo(R,cands[i],dmg,{el:'arcane',heavy:0});

/* ================= ultimates ================= */
G.sim.castUlt = (R,id) => { const u=D().ults.find(u=>u.id===id), st=R.ults[id];
  if(!u||!st||st.cd>0||R.over)return false;
  const lvl=(G.S.ults[id]&&G.S.ults[id].lvl)|0,
        pw=(1+lvl*D().ultUp.perLevel+(R.mods.ultDmg||0)+(R.twUltPow||0))*(R.mods.ultGlobal||1);
  st.cd=u.cd*Math.pow(1-D().ultUp.cdEvery5,(lvl/5)|0)*(R.mods.ultCd||1)*(R.twUltCd||1);
  const cx=R.lay.spire.x,cy=R.lay.spire.y,f=u.fx;
  const base=BN.mulN(R.spire.d,8*pw);
  const ctrlOk=e=>!(e.d&&e.d.fx&&e.d.fx.ctrlUltImmune);
  if(f.nova)queryR(R,cx,cy,f.nova.r*2).concat(R.boss&&R.boss.alive?[R.boss]:[]).forEach(e=>{dmgTo(R,e,BN.mulN(base,f.nova.p),{el:u.el,ult:1,heavy:1});if(ctrlOk(e))e.vuln=Math.max(e.vuln,1+(f.key?f.key.vulnerable:0));});
  if(f.pullPoint)R.enemies.forEach(e=>{if(e.alive&&ctrlOk(e))e.dist=Math.max(0,e.dist-60)});
  if(f.implode)queryR(R,cx,cy,f.pullPoint?f.pullPoint.r*2:200).forEach(e=>dmgTo(R,e,BN.mulN(base,f.implode.p),{el:u.el,ult:1,heavy:1}));
  if(f.meteors)R.effects.push({k:'meteors',n:f.meteors.n,p:BN.mulN(base,f.meteors.p),t:f.meteors.t,every:f.meteors.t/f.meteors.n,acc:0,el:'fire'});
  if(f.enemySlow)R.enemies.forEach(e=>{if(ctrlOk(e)&&!(e.d.tags&&e.d.tags.includes('frostward'))){e.slow=Math.max(e.slow,f.enemySlow.p);e.slowT=Math.max(e.slowT,f.enemySlow.t);}});
  if(f.towerRate)R.towers.forEach(t=>{t.rtBuff=f.towerRate.p;t.rtBuffUntil=R.t+f.towerRate.t;G.sim.towerStats(R,t);});
  if(f.chain&&R.enemies.length){const hit=new Set();let cur=R.enemies.find(e=>e.alive);
    if(cur){let n=f.chain.n,d=BN.mulN(base,f.chain.p);
      while(cur&&n-->0){hit.add(cur);dmgTo(R,cur,d,{el:u.el,ult:1});d=BN.mulN(d,f.chain.f);
        cur=R.enemies.find(e=>e.alive&&!hit.has(e));}}}
  if(f.econ)R.econBoost={p:f.econ.p,until:R.t+f.econ.t};
  if(f.refund)R.refund={p:f.refund.p,until:R.t+f.refund.t};             // Mana Font upgrade refund window
  if(f.reflect)R.wardReflect={p:f.reflect.p,until:R.t+f.reflect.t};     // Prismatic Ward reflect window
  if(f.shield)R.spire.ward=BN.add(R.spire.ward,BN.mulN(R.spire.hpMax,f.shield.p));
  if(f.blades)R.effects.push({k:'blades',dps:BN.mulN(base,f.blades.p),t:f.blades.t,el:'fire'});
  if(f.wells)R.zones.push({k:'well',x:cx,y:cy,r:f.wells.r*3,slow:f.wells.slow,dps:BN.mulN(base,f.wells.p*.2),t:f.wells.t});
  if(f.pillar){const tgt=R.boss&&R.boss.alive?R.boss:R.enemies.find(e=>e.alive);
    if(tgt)dmgTo(R,tgt,BN.mulN(base,f.pillar.p*(1+(tgt===R.boss?f.pillar.vsBoss:0))),{el:u.el,ult:1,heavy:1});}
  G.bus.emit('ult',id); return true;
};
const ultTick = (R,dt) => { for(const id in R.ults){const st=R.ults[id]; if(st.cd>0)st.cd-=dt;
  const auto=(G.S.ults[id]&&G.S.ults[id].auto)||R.mode==='idle'||(R.mode==='balanced'&&(G.S.ults[id]&&G.S.ults[id].auto!==0));
  if(st.cd<=0&&auto&&G.S.slotted.includes(id)&&(R.enemies.some(e=>e.alive)||R.boss&&R.boss.alive))G.sim.castUlt(R,id);}

      if(alive.length){const e=G.pick(alive);dmgTo(R,e,ef.p,{el:'fire',ult:1,heavy:1});queryR(R,e.x,e.y,44).forEach(o=>{if(o!==e)dmgTo(R,o,BN.mulN(ef.p,.5),{el:'fire',ult:1});});}}}

/* ================= boss engine ================= */

  const lane=R.lanes[0];
  const boss={d:{id:b.id,nm:sig?ti.bossNm:b.nm,fx:{}},def:b,hp:C.bnFromLog10(hpL),maxhp:C.bnFromLog10(hpL),
    dist:0,lane:0,spd:16,x:lane.pts[0].x,y:lane.pts[0].y,alive:1,st:{},slow:0,slowT:0,frz:0,stun:0,lastHit:-9,

const initBossPassives = b => { b.moves.forEach(m=>{ const f=m.fx||{};   // cd:0 moves = standing mechanics
  if(f.armor&&!b.armorOn&&!b._armorInit){b._armorInit=1;b.armorOn=1;b.armorDr=f.armor.dr;b.armorHp=BN.mulN(b.maxhp,.15);}
  if(f.reform)b.reformAfter=f.reform.after||6;
  if(f.intercept&&b.interceptN==null){b.interceptN=f.intercept.n;b._intMax=f.intercept.n;}
  if(f.shieldArc)b.shieldArc=f.shieldArc;
  if(f.headRegrow)b.headRegrow=1;
  if(f.adapt)b.adaptPassive=f.adapt.dr||.7;
  if(f.rangeCut)b.rangeCutP=f.rangeCut.p; }); };

    if(f.convergeBeam){let dc=BN.mulN(b.maxhp,.004*(f.convergeBeam.p||3)*(1-spDR(R))); R._bossHurt=1;

/* ================= round/wave driver ================= */
G.sim.startRound = R => { R.round++; R.roundT=0; R.killsRound=0;
  R._rw=C.bnFromLog10(C.rwLog10(R.round,R.tier));
  R.phase='wave';
  if(R.round%10===0){ R.waveQ=[]; G.sim.spawnBoss(R); }
  else { R.waveQ=G.sim.buildWave(R);
    const hpL=C.hpLog10(R.round,R.tier); R._waveHp=BN.mulN(C.bnFromLog10(hpL),R.waveQ.length);
    if(!R._waveHp||BN.isZ(R._waveHp))R._waveHp=BN.ONE(); }
  if(R.round%10===0&&R.boss)R._waveHp=R.boss.maxhp;
  G.bus.emit('round',R.round);
};
const roundDone = R => R.phase==='wave'&&(!R.waveQ||!R.waveQ.length)&&!R.enemies.some(e=>e.alive)&&(!R.boss||!R.boss.alive);
G.sim.step = (R,dt) => { if(R.over)return;
  R.t+=dt; R.roundT+=dt;
  if(R.phase==='idle')G.sim.startRound(R);
  if(R.waveQ&&R.waveQ.length){ while(R.waveQ.length&&R.waveQ[0].at<=R.roundT){ spawn(R,R.waveQ.shift().id); } }
  rebuildHash(R);
  R._detect=R.towers.some(t=>t.fx&&t.fx.detect)||R.round<15;
  R.enemies.forEach(e=>tickEnemy(R,e,dt));
  if(R.enemies.length>140)R.enemies=R.enemies.filter(e=>e.alive); // pool trim
  R.towers.forEach(t=>towerTick(R,t,dt));
  spireTick(R,dt); ultTick(R,dt); bossTick(R,dt); ecoTick(R,dt);
  /* idle income + wisp */
  const dl=R.daily&&R.daily.ids||[];
  if(!dl.includes('noidle')){
    const inc=BN.mulN(R._rw||BN.ONE(),.02*dt*(1+(R.twInc||0))*(R.econBoost&&R.t<R.econBoost.until?1+R.econBoost.p:1));
    R.essence=BN.add(R.essence,inc); }
  R.income=BN.mulN(R._rw||BN.ONE(),.02*(1+(R.twInc||0)));
  if(dl.includes('budget')){const cap=BN.mulN(R._rw||BN.ONE(),40); if(BN.gte(R.essence,cap))R.essence=cap;}
  if(R.daily&&!R.daily.done&&R.round>=R.daily.goal){R.daily.done=1;      // daily objective reached — pay out
    if(G.liveops&&G.liveops.completeDaily){const rw=G.liveops.completeDaily(G.S,R.daily.idx);
      if((R.daily.ids||[]).length>=3)G.S.stats.mod3win=1;
      G.bus.emit('dailyWin',{daily:R.daily,rw});}}
  if(!G.S.stats.ess1t&&BN.gte(R.essence,BN.from(1e12)))G.S.stats.ess1t=1;
  R.wispT-=dt; if(R.wispT<=0){R.wispT=45+G.rng()*45*(1/(R.mods.wispFreq||1));
    R.essence=BN.add(R.essence,BN.mulN(R.income,90)); R.stats.wisps++; G.S.wispsLife++; G.bus.emit('wisp',1);}
  /* perks every 5 rounds */
  if(R.round>=R.perkAt&&R.phase==='wave'){R.perkAt+=D().perks.every; R.pendingPerk=pickPerks(R);
    if(R.mode!=='active'){G.sim.pickPerk(R,0);} } // idle/balanced auto-pick heuristic (LOCKED #6)
  if(roundDone(R)){ /* wave clear bonus 30% */
    R.essence=BN.add(R.essence,BN.mulN(BN.mul(R._rw,R.combo),.3*R.mods.essGain*G.D.modes[R.mode].mult));
    const totInt=Math.min(.1,(R.mods.interest||0)+(R.twInterest||0));   // codex + Prism Bank class
    if(totInt){R.essence=BN.mulN(R.essence,1+totInt);
      G.S.stats.interestEss=Math.min(1e15,(G.S.stats.interestEss||0)+Math.min(1e12,BN.toNum(BN.mulN(R.essence,totInt))));}
    if(R.round%25===0&&G.liveops&&G.liveops.passGain)G.liveops.passGain(1);
    R.towers.forEach(t=>{if(t.fx&&t.fx.bank)                            // banked income pays out at the bell
      R.essence=BN.add(R.essence,BN.mulN(R.income,Math.min(t.fx.bank.cap||60,R.roundT)));});
    R.roundLvl=(R.roundLvl|0)+((R.round%25===0)?1:0);
